# Deploy the FastAPI backend to Render (free tier) so GitHub Pages (HTTPS) can call it.
# Dashboard: New → Blueprint → connect this repo → add GROQ_API_KEY and/or OPENAI_API_KEY.
# Then set GitHub secret BIST_API_BASE_URL to https://<your-service>.onrender.com (no trailing slash).

services:
  - type: web
    name: bist-rag-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.railway
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: auto
      - key: PORT
        value: "8080"
